name: documentation
on:
  push:
    branches:
      - master

jobs:
  publish-docs:
    name: github pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"
      - name: Install dependencies
        # Keep the root workspace visible so the temporary webpackbar override
        # applies until Docusaurus includes the webpack 5.106+ compatibility fix.
        run: pnpm install --frozen-lockfile
      - name: Typecheck docs
        run: pnpm run --filter docs typecheck
      - name: Build docs
        run: pnpm run --filter docs build
      - name: GitHub Pages
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          build_dir: ./packages/documentation/build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_REPO }}
