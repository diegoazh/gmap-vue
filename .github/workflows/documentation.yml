name: documentation

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish-docs:
    name: github pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Enable pnpm with Corepack
        run: corepack enable
      - name: Install dependencies
        # Keep the root workspace visible so workspace-level pnpm policy applies.
        # Ignore workspace lifecycle hooks; docs validation does not need them.
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Typecheck docs
        run: pnpm run --filter docs typecheck
      - name: Build docs
        run: pnpm run --filter docs build
      - name: GitHub Pages
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          # Docusaurus emits into build/ with URLs scoped by baseUrl=/gmap-vue/.
          # GitHub project pages serve the branch root at /gmap-vue/.
          build_dir: ./packages/documentation/build
        env:
          GITHUB_TOKEN: ${{ github.token }}
