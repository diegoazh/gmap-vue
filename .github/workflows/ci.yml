name: ci

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - master
      - next
      - "next/**"

jobs:
  install-and-cache:
    name: Install dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Enable pnpm with Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Upload pnpm-lock.yaml as artifact
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
    outputs:
      lock-file: ./pnpm-lock.yaml

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [install-and-cache]

    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Enable pnpm with Corepack
        run: corepack enable
      - name: Download pnpm-lock.yaml artifact
        uses: actions/download-artifact@v8
        with:
          name: pnpm-lock
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build package
        run: pnpm run --filter @gmap-vue/v3 build
      - name: Typecheck package
        run: pnpm run --filter @gmap-vue/v3 type-check
      - name: Upload dist as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ./packages/v3/dist

  test:
    name: Test project
    runs-on: ${{ matrix.os }}
    needs: [install-and-cache, build]

    strategy:
      fail-fast: false
      matrix:
        include:
          # pnpm 11 requires Node.js >=22.13, so the CI matrix starts at the
          # current LTS. Future packageManager upgrades should update this
          # matrix together with package.json.
          - os: ubuntu-latest
            node-version: 22.x
            test-plan: test
          - os: ubuntu-latest
            node-version: 22.x
            test-plan: "test:e2e"
          - os: windows-latest
            node-version: 22.x
            test-plan: test
          - os: windows-latest
            node-version: 22.x
            test-plan: "test:e2e"
          # Incoming LTS (24.x) - amd64 on Ubuntu
          - os: ubuntu-latest
            node-version: 24.x
            test-plan: test
          - os: ubuntu-latest
            node-version: 24.x
            test-plan: "test:e2e"

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Enable pnpm with Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Create env file
        if: matrix.test-plan == 'test:e2e'
        shell: bash
        env:
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
        run: |
          if [ -z "$VITE_GOOGLE_API_KEY" ]; then
            echo "VITE_GOOGLE_API_KEY secret is required for e2e tests" >&2
            exit 1
          fi

          touch ./packages/v3/cypress/runner/.env
          echo VITE_GOOGLE_API_KEY=$VITE_GOOGLE_API_KEY >> ./packages/v3/cypress/runner/.env
      - name: Build package for smoke tests
        if: matrix.test-plan == 'test'
        run: pnpm run --filter @gmap-vue/v3 build
      - name: Run unit and package smoke tests
        if: matrix.test-plan == 'test'
        run: pnpm run --filter @gmap-vue/v3 test:ci
      # start-server-and-test@2.0.8 → ps-tree@1.2.0 → wmic.exe, which was
      # removed from Windows Server 2025 (windows-latest). Tests complete
      # successfully but the post-test cleanup crashes with ENOENT, causing
      # exit code 1. Work around by managing the server lifecycle directly
      # with bash (available on all runners via Git Bash), so process teardown
      # uses bash's built-in kill instead of wmic.exe.
      - name: Build and run e2e tests
        if: matrix.test-plan == 'test:e2e'
        shell: bash
        working-directory: ./packages/v3
        run: |
          pnpm run test:e2e:build
          pnpm exec cypress install
          # Start vite preview in the background
          pnpm exec vite preview --config cypress/runner/vite.config.mts &
          SERVER_PID=$!
          # Wait up to 60 s for the server using Node.js built-in http
          # (no extra runtime dependencies required)
          node -e "
            const http = require('http');
            const check = (n) => {
              http.get('http://localhost:4173/', () => process.exit(0))
                  .on('error', () => n > 0 ? setTimeout(() => check(n - 1), 1000)
                                           : process.exit(1));
            };
            check(60);
          "
          # Run Cypress; capture exit code so we can forward it after cleanup
          pnpm exec cypress run --e2e
          CYPRESS_EXIT=$?
          # Shut down the preview server with bash kill — no wmic.exe
          kill $SERVER_PID 2>/dev/null || true
          exit $CYPRESS_EXIT
